name: Build pixel-driller API

on:
  pull_request:
    paths:
      - 'pixel_driller/**'
      - '.github/workflows/build-pixel-driller.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pixel_driller
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build pixel-driller Docker image
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:pixel_driller"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          tags: |
            ghcr.io/nismod/jsrat-pixel-driller:test-build
          secrets: |
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
